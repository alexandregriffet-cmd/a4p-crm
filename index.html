<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4P CRM PREMIUM</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Outfit',sans-serif;
  background:#0b1622;
  color:white;
}

.sidebar{
  width:240px;
  background:#101f2f;
  height:100vh;
  position:fixed;
  padding:20px;
}

.sidebar h2{
  color:#d4af37;
}

.nav{
  margin-top:20px;
}

.nav div{
  padding:10px;
  cursor:pointer;
  color:#9fb3c8;
}

.nav div:hover{
  background:#1c2e42;
  color:white;
}

.main{
  margin-left:240px;
  padding:20px;
}

.card{
  background:#122436;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:#1c2e42;
  color:white;
}

button{
  background:#d4af37;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.8;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.tag{
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
}

.hot{background:#e74c3c;}
.warm{background:#f39c12;}
.cold{background:#3498db;}
</style>
</head>

<body>

<div class="sidebar">
  <h2>A4P CRM</h2>
  <div class="nav">
    <div onclick="showView('dashboard')">Dashboard</div>
    <div onclick="showView('clubs')">Clubs</div>
    <div onclick="showView('prospection')">Prospection</div>
  </div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="view">
  <h1>Dashboard</h1>
  <div class="grid">
    <div class="card"><h2 id="totalClubs">0</h2><p>Clubs</p></div>
    <div class="card"><h2 id="hotLeads">0</h2><p>🔥 Chaud</p></div>
    <div class="card"><h2 id="ca">0€</h2><p>CA potentiel</p></div>
  </div>
</div>

<!-- CLUB -->
<div id="clubs" class="view" style="display:none;">
  <h1>Ajout club</h1>

  <div class="card">
    <input id="name" placeholder="Nom du club">
    <input id="sport" placeholder="Sport">
    <input id="contact" placeholder="Contact">
    <input id="budget" placeholder="Budget estimé (€)">
    
    <select id="niveau">
      <option>Départemental</option>
      <option>Régional</option>
      <option>National</option>
      <option>Élite</option>
    </select>

    <select id="besoin">
      <option>Découverte</option>
      <option>Atelier</option>
      <option>Suivi</option>
    </select>

    <textarea id="notes" placeholder="Notes..."></textarea>

    <button onclick="addClub()">Ajouter</button>
  </div>

  <div id="clubList"></div>
</div>

<!-- PROSPECTION -->
<div id="prospection" class="view" style="display:none;">
  <h1>Prospection intelligente</h1>

  <div class="card">
    <button onclick="exportCSV()">Exporter CSV</button>
  </div>

  <div id="prospectList"></div>
</div>

</div>

<script>
let clubs = JSON.parse(localStorage.getItem("clubs") || "[]")

function save(){
  localStorage.setItem("clubs", JSON.stringify(clubs))
  render()
}

function showView(view){
  document.querySelectorAll('.view').forEach(v=>v.style.display='none')
  document.getElementById(view).style.display='block'
}

function addClub(){
  let club = {
    name:document.getElementById("name").value,
    sport:document.getElementById("sport").value,
    contact:document.getElementById("contact").value,
    budget:parseInt(document.getElementById("budget").value)||0,
    niveau:document.getElementById("niveau").value,
    besoin:document.getElementById("besoin").value,
    notes:document.getElementById("notes").value
  }

  clubs.push(club)
  save()
}

function score(club){
  let s=0
  if(club.budget>5000) s+=3
  if(club.niveau==="National"||club.niveau==="Élite") s+=3
  if(club.besoin==="Suivi") s+=4
  return s
}

function render(){
  document.getElementById("totalClubs").innerText=clubs.length

  let hot=0
  let ca=0

  let html=""
  clubs.forEach((c,i)=>{
    let s=score(c)

    let tag="cold"
    if(s>=7){tag="hot";hot++;ca+=c.budget}
    else if(s>=4) tag="warm"

    html+=`
    <div class="card">
      <b>${c.name}</b> (${c.sport})<br>
      ${c.niveau} - ${c.besoin}<br>
      ${c.budget}€<br>
      <span class="tag ${tag}">${tag}</span>
      <br><br>
      <button onclick="deleteClub(${i})">Supprimer</button>
    </div>
    `
  })

  document.getElementById("clubList").innerHTML=html
  document.getElementById("hotLeads").innerText=hot
  document.getElementById("ca").innerText=ca+"€"

  document.getElementById("prospectList").innerHTML=html
}

function deleteClub(i){
  clubs.splice(i,1)
  save()
}

function exportCSV(){
  let csv="Nom,Sport,Budget\n"
  clubs.forEach(c=>{
    csv+=`${c.name},${c.sport},${c.budget}\n`
  })

  let blob=new Blob([csv])
  let a=document.createElement("a")
  a.href=URL.createObjectURL(blob)
  a.download="prospects.csv"
  a.click()
}

render()
</script>

</body>
</html>
