<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4P CRM Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
--marine:#09151F;
--m2:#0f1e2d;
--m3:#162638;
--m4:#1d3247;
--or:#C8A45A;
--or2:#e2c07a;
--orD:rgba(200,164,90,0.12);
--gris:#8A9CB5;
--grisD:rgba(138,156,181,0.1);
--vert:#3DD68C;
--bleu:#4EA8DE;
--rouge:#F05252;
--r:10px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Outfit',sans-serif;
background:var(--marine);
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sb{
width:230px;
background:var(--m2);
padding:20px;
}

.logo{
font-size:20px;
font-weight:700;
color:var(--or);
margin-bottom:20px;
}

.ni{
padding:10px;
cursor:pointer;
border-radius:6px;
color:var(--gris);
}

.ni:hover{background:var(--grisD);color:white}
.ni.on{background:var(--orD);color:var(--or)}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:var(--m2);
}

.content{
flex:1;
overflow:auto;
padding:20px;
}

.card{
background:var(--m2);
border-radius:var(--r);
padding:20px;
margin-bottom:20px;
}

.btn{
background:linear-gradient(135deg,var(--or),var(--or2));
color:black;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

input, select, textarea{
width:100%;
padding:8px;
margin-top:5px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
color:white;
border-radius:6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sb">
<div class="logo">A4P CRM</div>

<div class="ni on" onclick="setView('dashboard')">Dashboard</div>
<div class="ni" onclick="setView('clubs')">Clubs</div>
<div class="ni" onclick="setView('joueurs')">Joueurs</div>
<div class="ni" onclick="setView('offres')">Offres</div>

<br>

<button class="btn" onclick="exportData()">Exporter</button>
<input type="file" onchange="importData(event)">
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div id="title">Dashboard</div>
<button class="btn" onclick="openAdd()">+ Ajouter</button>
</div>

<div class="content" id="app">
  <!-- DASHBOARD -->
<div id="view-dashboard" class="view">
<div class="card">
<h2>Dashboard</h2>
<p id="stats"></p>
</div>
</div>

<!-- CLUBS -->
<div id="view-clubs" class="view" style="display:none">
<div class="card">
<h2>Clubs</h2>
<div id="clubs-list"></div>
</div>
</div>

<!-- JOUEURS -->
<div id="view-joueurs" class="view" style="display:none">
<div class="card">
<h2>Joueurs</h2>
<div id="joueurs-list"></div>
</div>
</div>

<!-- OFFRES -->
<div id="view-offres" class="view" style="display:none">
<div class="card">
<h2>Offres</h2>
<div id="offres-list"></div>
</div>
</div>
<script>

// ================= DATA =================
const KEY = "a4p_crm_v4";

let DB = {
clubs: [],
joueurs: [],
offres: []
};

// ================= STORAGE =================
function save(){
localStorage.setItem(KEY, JSON.stringify(DB));
}

function load(){
const data = localStorage.getItem(KEY);
if(data) DB = JSON.parse(data);
}

// ================= VIEWS =================
function setView(v){
document.querySelectorAll('.view').forEach(e=>e.style.display='none');
document.getElementById('view-'+v).style.display='block';
document.getElementById('title').innerText = v.toUpperCase();
render();
}

// ================= RENDER =================
function render(){

document.getElementById("stats").innerHTML =
"Clubs: "+DB.clubs.length+" | Joueurs: "+DB.joueurs.length+" | Offres: "+DB.offres.length;

// CLUBS
let chtml = "";
DB.clubs.forEach(c=>{
chtml += `<div class="card">${c.nom}</div>`;
});
document.getElementById("clubs-list").innerHTML = chtml;

// JOUEURS
let jhtml = "";
DB.joueurs.forEach(j=>{
jhtml += `<div class="card">${j.nom}</div>`;
});
document.getElementById("joueurs-list").innerHTML = jhtml;

// OFFRES
let ohtml = "";
DB.offres.forEach(o=>{
ohtml += `<div class="card">${o.nom} - ${o.montant}€</div>`;
});
document.getElementById("offres-list").innerHTML = ohtml;

}

// ================= ADD =================
function openAdd(){
const type = prompt("Type: club / joueur / offre");

if(type==="club"){
const nom = prompt("Nom club");
DB.clubs.push({nom});
}

if(type==="joueur"){
const nom = prompt("Nom joueur");
DB.joueurs.push({nom});
}

if(type==="offre"){
const nom = prompt("Nom offre");
const montant = prompt("Montant");
DB.offres.push({nom, montant});
}

save();
render();
}

// ================= EXPORT =================
function exportData(){
const blob = new Blob([JSON.stringify(DB)], {type:'application/json'});
const a = document.createElement('a');
a.href = URL.createObjectURL(blob);
a.download = "crm.json";
a.click();
}

// ================= IMPORT =================
function importData(e){
const file = e.target.files[0];
const reader = new FileReader();
reader.onload = ()=>{
DB = JSON.parse(reader.result);
save();
render();
};
reader.readAsText(file);
}

// ================= INIT =================
load();
render();

</script>
</div>
</div>
</body>
</html>
