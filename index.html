<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4P CRM ULTRA PREMIUM</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0c1b2a;
  color:#fff;
}

header {
  padding:20px;
  background:#09121c;
  border-bottom:1px solid #1f2f45;
}

h1 {
  margin:0;
  color:#d4af37;
}

.container {
  padding:20px;
}

.card {
  background:#12263a;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input, select, textarea {
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:15px;
  border-radius:8px;
  border:none;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-primary {
  background:#d4af37;
  color:#000;
}

.btn-danger {
  background:#e74c3c;
}

.btn-secondary {
  background:#34495e;
}

.pipeline {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.badge {
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
}

.status-qualification { background:#3498db; }
.status-proposition { background:#9b59b6; }
.status-negociation { background:#f39c12; }
.status-gagne { background:#2ecc71; }
.status-perdu { background:#e74c3c; }

</style>
</head>

<body>

<header>
  <h1>A4P CRM ULTRA PREMIUM</h1>
</header>

<div class="container">

<!-- AJOUT CLUB -->
<div class="card">
<h2>Ajouter un club</h2>

<input id="nom" placeholder="Nom du club">
<input id="ville" placeholder="Ville">

<select id="niveau">
  <option>Départemental</option>
  <option>Régional</option>
  <option>National</option>
  <option>Élite</option>
  <option>Institutionnel</option>
</select>

<select id="besoin">
  <option>Découverte</option>
  <option>Atelier</option>
  <option>Cycle court</option>
  <option>Accompagnement saison</option>
  <option>Suivi individuel</option>
</select>

<input id="budget" placeholder="Budget estimé (€)">
<textarea id="objectif" placeholder="Objectif du club"></textarea>

<button class="btn-primary" onclick="addClub()">Ajouter</button>
</div>

<!-- LISTE CLUB -->
<div id="clubs"></div>

</div>

<script>

let clubs = JSON.parse(localStorage.getItem("clubs") || "[]")

function save() {
  localStorage.setItem("clubs", JSON.stringify(clubs))
}

function scoreClub(c) {
  let score = 0

  if (c.niveau === "Élite") score += 5
  if (c.niveau === "National") score += 4
  if (c.niveau === "Régional") score += 3

  if (c.besoin === "Accompagnement saison") score += 5
  if (c.besoin === "Cycle court") score += 3

  if (c.budget > 10000) score += 5
  if (c.budget > 3000) score += 3

  return score
}

function addClub() {
  const club = {
    id: Date.now(),
    nom: document.getElementById("nom").value,
    ville: document.getElementById("ville").value,
    niveau: document.getElementById("niveau").value,
    besoin: document.getElementById("besoin").value,
    budget: parseInt(document.getElementById("budget").value || 0),
    objectif: document.getElementById("objectif").value,
    statut: "Qualification",
    nextAction: "Appel",
    date: new Date().toLocaleDateString()
  }

  clubs.push(club)
  save()
  render()
}

function render() {
  const container = document.getElementById("clubs")
  container.innerHTML = ""

  clubs.sort((a,b)=> scoreClub(b) - scoreClub(a))

  clubs.forEach(c => {
    container.innerHTML += `
      <div class="card">
        <h3>${c.nom} (${c.ville})</h3>
        <p>Niveau : ${c.niveau}</p>
        <p>Besoin : ${c.besoin}</p>
        <p>Budget : ${c.budget} €</p>
        <p>Score : ${scoreClub(c)}</p>

        <span class="badge status-${c.statut.toLowerCase()}">${c.statut}</span>

        <br><br>

        <button class="btn-secondary" onclick="nextStep(${c.id})">Étape suivante</button>
        <button class="btn-danger" onclick="deleteClub(${c.id})">Supprimer</button>

        <button class="btn-primary" onclick="generateOffer(${c.id})">Générer offre</button>
      </div>
    `
  })
}

function nextStep(id) {
  const steps = ["Qualification","Proposition","Négociation","Gagné"]
  let c = clubs.find(x=>x.id===id)
  let i = steps.indexOf(c.statut)
  if (i < steps.length-1) c.statut = steps[i+1]
  save()
  render()
}

function deleteClub(id) {
  clubs = clubs.filter(c=>c.id!==id)
  save()
  render()
}

function generateOffer(id) {
  const c = clubs.find(x=>x.id===id)

  let offre = ""

  if (c.besoin === "Atelier") offre = "Atelier 3h30 - 800€"
  if (c.besoin === "Cycle court") offre = "Cycle 6 séances - 3000€"
  if (c.besoin === "Accompagnement saison") offre = "Suivi saison - 12000€"

  alert("Offre recommandée : " + offre)
}

render()

</script>

</body>
</html>
